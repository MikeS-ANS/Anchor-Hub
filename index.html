<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <div class="sidebar-logo">
        <img src="Anchor_Logo_High.png" alt="Anchor Network Solutions" draggable="false" />
      </div>
    </div>
    <div class="titlebar-lastrun" id="titlebar-lastrun" style="display:none">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span id="lastrun-text"></span>
    </div>
    <div class="titlebar-controls">
      <button class="win-btn" id="btn-min" title="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="btn-max" title="Maximize">
        <svg width="9" height="9" viewBox="0 0 9 9"><rect x="0.5" y="0.5" width="8" height="8" rx="0.5" stroke="currentColor" fill="none"/></svg>
      </button>
      <button class="win-btn close" id="btn-close" title="Close">
        <svg width="9" height="9" viewBox="0 0 9 9"><line x1="0" y1="0" x2="9" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="0" x2="0" y2="9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- Update banner (injected by app.js when an update is ready to install) -->
  <div id="update-banner" style="display:none"></div>

  <!-- App shell -->
  <div class="app-shell">
    <!-- Sidebar -->
    <nav class="sidebar">
      <ul class="nav-list" id="nav-list">
        <li class="nav-item" data-view="home">
          <div class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 7l6-5 6 5v7a1 1 0 01-1 1H3a1 1 0 01-1-1V7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M6 14v-4h4v4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Home</span>
        </li>
      </ul>
      <div class="sidebar-section-label">Tools</div>
      <ul class="nav-list" id="tools-nav">
        <!-- Populated dynamically by renderSidebar() in app.js -->
      </ul>

      <div class="sidebar-bottom">
        <button class="sidebar-action" id="btn-help" data-view="help">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5.2 5.2a1.8 1.8 0 1 1 2.3 1.7C7 7.2 7 7.6 7 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7" cy="10" r="0.7" fill="currentColor"/>
          </svg>
          Help
        </button>
        <button class="sidebar-action" id="btn-settings" data-view="settings">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Settings
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="content" id="content">
      <!-- Views injected by JS -->
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
